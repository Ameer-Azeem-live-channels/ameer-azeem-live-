<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- சோசியல் மீடியா முன்னோட்டம் (Rich Preview) -->
    <title>Ameer Azeem Global Media - Live TV</title>
    <meta name="description" content="Watch 65+ Live Channels in 7 Languages. Download Ameer Azeem App!">
    <meta property="og:title" content="Ameer Azeem Global Media - Live TV">
    <meta property="og:description" content="7 மொழிகளில் 65-க்கும் மேற்பட்ட நேரலை சேனல்கள். அமீர் அஜீம் ஆப்பை உடனே டவுன்லோட் செய்யுங்கள்!">
    <meta property="og:image" content="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/assets/images/ameer%20azeem%20logo/logo.png.png">
    <meta property="og:url" content="https://ameer-azeem-live-channels.github.io/">
    <meta property="og:type" content="website">

    <style>
        :root {
            --primary-red: #b71c1c;
            --bg-black: #030712;
            --card-bg: #0f172a;
            --accent-blue: #3b82f6;
            --whatsapp-green: #25d366;
        }

        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 25px 20px; background: linear-gradient(to bottom, #111827, var(--bg-black)); }
        .logo { height: 90px; cursor: pointer; transition: 0.4s; filter: drop-shadow(0 0 10px rgba(183,28,28,0.3)); }
        .logo:hover { transform: scale(1.1); }

        /* News Ticker */
        .ticker-wrap { background: rgba(183, 28, 28, 0.15); height: 45px; overflow: hidden; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ticker-label { background: var(--primary-red); padding: 0 15px; height: 100%; display: flex; align-items: center; font-weight: bold; font-size: 12px; }
        .ticker { white-space: nowrap; animation: marquee 30s linear infinite; padding-left: 20px; font-size: 15px; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Language Nav */
        .nav-scroll { display: flex; overflow-x: auto; gap: 20px; padding: 20px; justify-content: center; background: rgba(255,255,255,0.02); }
        .lang-btn { text-align: center; cursor: pointer; min-width: 85px; }
        .lang-circle { width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(59, 130, 246, 0.2); padding: 3px; background: #000; object-fit: cover; }
        .active-lang .lang-circle { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .lang-name { font-size: 11px; margin-top: 8px; font-weight: bold; color: #94a3b8; text-transform: uppercase; }

        /* Player */
        #player-container { width: 95%; max-width: 950px; margin: 20px auto; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Channels */
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .channel-card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.03); }
        .channel-card:hover { border-color: var(--accent-blue); transform: scale(1.05); }
        .channel-card img { width: 65px; height: 65px; object-fit: contain; }

        /* Share & Connect */
        .share-section { text-align: center; padding: 40px 20px; background: rgba(0,0,0,0.3); }
        .share-bar { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
        .btn { padding: 12px 25px; border-radius: 30px; color: white; text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .wa { background: var(--whatsapp-green); } .tg { background: #0088cc; } .fb { background: #1877f2; }

        footer { text-align: center; padding: 50px 20px; color: #64748b; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05); }
        .est { color: var(--primary-red); font-weight: bold; margin-bottom: 10px; }
        .feedback-btn { color: var(--accent-blue); text-decoration: none; font-weight: bold; border: 1px solid var(--accent-blue); padding: 8px 20px; border-radius: 25px; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <a href="https://github.com/Ameer-Azeem-live-channels/ameer-azeem-live-/releases/download/v1.0/Ameer_Azeem_Live_Official.apk">
        <img src="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/assets/images/ameer%20azeem%20logo/logo.png.png" class="logo" alt="Ameer Azeem">
    </a>
</header>

<div class="ticker-wrap">
    <div class="ticker-label">LIVE NEWS</div>
    <div class="ticker" id="ticker-text">அமீர் அஜீம் குளோபல் மீடியா நெட்வொர்க்கிற்கு உங்களை வரவேற்கிறோம்!</div>
</div>

<div class="nav-scroll" id="lang-nav"></div>

<div id="player-container">
    <iframe id="main-player" src="https://www.youtube.com/embed/9M02G5c6x6w" allowfullscreen></iframe>
</div>

<div class="channel-grid" id="channel-list"></div>

<div class="share-section">
    <div style="color: #94a3b8; font-size: 13px;">CONNECT & SHARE</div>
    <div class="share-bar">
        <a href="https://wa.me/8270242654" class="btn wa">WhatsApp Us</a>
        <a href="https://t.me/AjiranGroup" class="btn tg">Telegram Group</a>
        <a href="https://www.facebook.com/sharer/sharer.php?u=https://ameer-azeem-live-channels.github.io/" class="btn fb">Share on Facebook</a>
    </div>
</div>

<footer>
    <div class="est">Established: September 2025</div>
    <p>AMEER AZEEM GLOBAL MEDIA &copy; 2026</p>
    <a href="https://t.me/AjiranGroup" class="feedback-btn">💬 SEND FEEDBACK (TELEGRAM)</a>
</footer>

<script>
    const GIST_URL = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json";
    const IMAGE_BASE = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/assets/images/";
    
    let allData = {};
    const categories = ["TAMIL", "ENGLISH", "HINDI", "MALAYALAM", "TELUGU", "KANNADA", "ARABIC"];
    const langIcons = ["tamil.png", "english.png", "hindi.png", "malayalam.png", "telugu.png", "kanada.png", "arabic.png"];

    const channelMapping = {
        "TAMIL": ["sun-news.png.png", "news-seven.png.png", "tamil-news.png.png", "news-thanthi.png.png", "polimer-news.png.png", "sathiya-news.png.png", "jayapluse-news.png.png", "kalaigar- news.png.png", "malaimurasu-news.png.png", "tamilnadu-news18.png.png", "puthiya-thalaimurai-news.png.png"],
        "ENGLISH": ["repulics-english.png.png", "Time-now-english.png.png", "ndtc-english.png.png", "india-today-english.png.png", "cnn-english.png.png", "wion-english.png.png", "Sky-news-english.png.png", "dw-news-english.png.png", "al-Jazeera-english.png.png", "al-arabiya-english.png.png", "first-post-english.png.png", "united-nations-english.png.png", "earch-cam.png.png", "cruxnews.png"],
        "HINDI": ["aaj-tak-hindi-news.png.png", "abp-hindi-news.png.png", "z-news-hindi.png.png", "india-today-news.png.png", "cnn-hindi-news18.png.png", "republic-bharath-news.png.png", "time-nowhindi-news.png.png", "tv9-hindi-news.png.png", "24-think-hindi -news.png.png", "dd-news-hindi.png.png", "dna-hindi-news.png.png"],
        "MALAYALAM": ["asianet-news.png.png", "twenty-four-news.png.png", "media-one-news.png", "reporter-news.png.png", "kairali-news.png", "news18 -malayalam.png", "big-tv-news.png"],
        "TELUGU": ["tv9-telugu-news.png", "ntv-telugu-news.png", "z-news-telugu.png", "abc-telugu-news.png", "tv5-news-telugu.png", "10tv-telugu-news.png", "hmtv-telugu-news.png", "bigtv-news-telugu.png"],
        "KANNADA": ["tv9-kanada-news.png.png", "news18-kanada.png.png", "news1st-kanada.png.png", "asianet-nwes-kanada.png"],
        "ARABIC": ["sky-news.png.png", "al-arabiya-news.png.png", "aljazeera-news.png.png", "france24-news.png.png", "al-quran-makkah.png.png", "arbic-alghad-news.png.png", "arabic-alaraby-news.png.png", "money-controal-arabic-news.png.png", "aljazeera- mubasher-news.png.png"]
    };

    async function start() {
        const res = await fetch(GIST_URL + "?t=" + Date.now());
        allData = await res.json();
        if(allData.admin_message) document.getElementById('ticker-text').innerText = allData.admin_message;
        loadNav();
        loadGrid("TAMIL");
    }

    function loadNav() {
        const nav = document.getElementById('lang-nav');
        categories.forEach((cat, i) => {
            const div = document.createElement('div');
            div.className = 'lang-btn' + (cat === "TAMIL" ? " active-lang" : "");
            div.onclick = () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
                div.classList.add('active-lang');
                loadGrid(cat);
            };
            div.innerHTML = `<img src="${IMAGE_BASE}languages/${langIcons[i]}" class="lang-circle"><div class="lang-name">${cat}</div>`;
            nav.appendChild(div);
        });
    }

    function loadGrid(lang) {
        const grid = document.getElementById('channel-list');
        grid.innerHTML = "";
        const folder = lang.toLowerCase() + "channels/";
        channelMapping[lang].forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.onclick = () => {
                const vid = allData[ch];
                if(vid) {
                    document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                    window.scrollTo({top: 150, behavior: 'smooth'});
                }
            };
            card.innerHTML = `<img src="${IMAGE_BASE}${folder}${ch}" onerror="this.src='${IMAGE_BASE}ameer%20azeem%20logo/logo.png.png'">`;
            grid.appendChild(card);
        });
    }

    start();
</script>
</body>
</html>
