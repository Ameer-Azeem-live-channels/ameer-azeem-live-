<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- சோசியல் மீடியா லிங்க் ப்ரிவியூ - லோகோ லிங்க் மிகச்சரியாக கொடுக்கப்பட்டுள்ளது -->
    <title>Ameer Azeem Global Media - Live TV</title>
    <meta property="og:title" content="Ameer Azeem Global Media">
    <meta property="og:description" content="Watch 65+ Live TV Channels in 7 Languages. Download our App now!">
    <meta property="og:image" content="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/logo.png.png">
    <meta property="og:url" content="https://ameer-azeem-live-channels.github.io/">
    <meta property="og:type" content="website">

    <style>
        :root { --primary-red: #b71c1c; --bg-black: #030712; --card-bg: #0f172a; --accent-blue: #3b82f6; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* லோகோ பகுதி - லேப்டாப்பில் பெரிதாகத் தெரியும் */
        header { text-align: center; padding: 50px 20px; background: #000; border-bottom: 3px solid var(--primary-red); }
        .logo { height: 140px; cursor: pointer; transition: 0.5s; filter: drop-shadow(0 0 20px rgba(183,28,28,0.6)); }
        .logo:hover { transform: scale(1.1); }
        .dl-hint { color: #94a3b8; font-size: 13px; margin-top: 15px; font-weight: bold; letter-spacing: 1px; }

        /* ஓடும் செய்தி */
        .ticker-wrap { background: #111827; height: 50px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid #1e293b; }
        .ticker-label { background: var(--primary-red); padding: 0 20px; font-weight: 900; height: 100%; display: flex; align-items: center; font-size: 13px; z-index: 10; box-shadow: 10px 0 20px black; }
        .ticker { white-space: nowrap; animation: marquee 30s linear infinite; padding-left: 20px; font-size: 16px; color: #f1f5f9; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        /* மொழி தேர்வுகள் - GLOWING EFFECT */
        .nav-scroll { display: flex; overflow-x: auto; gap: 25px; padding: 30px; justify-content: center; background: #0a0f1e; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .lang-btn { text-align: center; cursor: pointer; opacity: 0.5; transition: 0.4s; min-width: 95px; }
        .lang-circle { 
            width: 85px; height: 85px; border-radius: 50%; border: 3px solid #334155; 
            padding: 5px; background: #1e293b; object-fit: cover; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 24px;
        }
        .active-lang { opacity: 1; transform: scale(1.15); }
        .active-lang .lang-circle { border-color: var(--accent-blue); box-shadow: 0 0 25px var(--accent-blue); color: var(--accent-blue); }
        .lang-name { font-size: 13px; margin-top: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* செக்ஷன் தலைப்பு */
        .section-header { background: linear-gradient(90deg, #000, var(--primary-red), #000); padding: 18px; text-align: center; font-weight: 900; letter-spacing: 3px; font-size: 16px; margin: 10px 0; }
        
        /* பிளேயர் */
        #player-container { width: 95%; max-width: 1000px; margin: 20px auto; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid #334155; box-shadow: 0 0 60px rgba(0,0,0,1); }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* சேனல் கிரிட் */
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; padding: 40px 20px; max-width: 1150px; margin: 0 auto; }
        .channel-card { background: var(--card-bg); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .channel-card:hover { transform: translateY(-10px); border-color: var(--accent-blue); background: #1e293b; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .channel-card img { width: 85px; height: 85px; object-fit: contain; }

        /* ஃபீட்பேக் */
        .feedback-section { max-width: 550px; margin: 50px auto; padding: 30px; background: #0f172a; border-radius: 25px; text-align: center; border: 1px solid #1e293b; }
        .feedback-input { width: 90%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #030712; color: white; margin-bottom: 20px; resize: none; font-size: 15px; }
        .submit-btn { padding: 12px 50px; background: var(--accent-blue); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* ஷேர் & ஃபூட்டர் */
        .share-section { text-align: center; padding: 60px 20px; background: #000; border-top: 1px solid #1e293b; }
        .btn { padding: 15px 30px; border-radius: 40px; color: white; text-decoration: none; font-weight: bold; margin: 10px; display: inline-flex; align-items: center; gap: 10px; font-size: 15px; transition: 0.3s; }
        .wa { background: #25d366; } .fb { background: #1877f2; }
        
        footer { text-align: center; padding: 60px 20px; color: #64748b; font-size: 14px; background: #030712; border-top: 1px solid #1e293b; }
        .est { color: var(--primary-red); font-weight: bold; font-size: 16px; margin-bottom: 15px; }

        @media (max-width: 600px) {
            .logo { height: 90px; }
            .nav-scroll { justify-content: flex-start; }
            .channel-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <!-- தானியங்கி APK டவுன்லோட் லிங்க் -->
    <a id="apk-download-link" href="#">
        <img src="logo.png.png" class="logo" alt="Ameer Azeem">
    </a>
    <div id="hint-text" class="dl-hint">ஆப்பை பதிவிறக்கம் செய்ய லோகோவை அழுத்தவும்</div>
</header>

<div class="ticker-wrap">
    <div class="ticker-label" id="lbl-live">LIVE NEWS</div>
    <div class="ticker" id="ticker-text">Welcome to Ameer Azeem Global Media Network!</div>
</div>

<div class="nav-scroll" id="lang-nav"></div>

<div class="section-header" id="section-title">TAMIL NADU NEWS LIVE</div>

<div id="player-container">
    <iframe id="main-player" src="https://www.youtube.com/embed/9M02G5c6x6w" allowfullscreen></iframe>
</div>

<div class="channel-grid" id="channel-list"></div>

<div class="feedback-section">
    <h3 id="f-title">SEND FEEDBACK</h3>
    <textarea id="f-msg" class="feedback-input" rows="4" placeholder="Type here..."></textarea><br>
    <button class="submit-btn" onclick="sendF()" id="f-btn">SUBMIT</button>
</div>

<div class="share-section">
    <div id="share-txt" style="color: #94a3b8; margin-bottom: 20px; font-weight: bold;">SHARE WITH FRIENDS</div>
    <div class="share-bar">
        <a href="https://api.whatsapp.com/send?text=Watch%20Ameer%20Azeem%20Live%20TV%20https://ameer-azeem-live-channels.github.io/" class="btn wa">WhatsApp</a>
        <a href="https://www.facebook.com/sharer/sharer.php?u=https://ameer-azeem-live-channels.github.io/" class="btn fb">Facebook</a>
    </div>
</div>

<footer>
    <div id="est-date" class="est">Established: September 2025</div>
    <p>AMEER AZEEM GLOBAL MEDIA &copy; 2026</p>
</footer>

<script>
    const REPO = "Ameer-Azeem-live-channels/ameer-azeem-live-";
    const GIST_URL = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json";
    // இமேஜ் பேஸ் உங்கள் ரூட் ஃபோல்டருக்கு மாற்றப்பட்டுள்ளது
    const IMAGE_BASE = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/";
    
    let allData = {};
    const categories = ["TAMIL", "ENGLISH", "HINDI", "MALAYALAM", "TELUGU", "KANNADA", "ARABIC"];

    const translations = {
        "TAMIL": { live: "நேரலை செய்திகள்", welcome: "அமீர் அஜீம் மீடியா நெட்வொர்க்கிற்கு உங்களை வரவேற்கிறோம்!", title: "தமிழ் நேரலை செய்திகள்", hint: "ஆப்பை பதிவிறக்கம் செய்ய லோகோவை அழுத்தவும்", ftitle: "கருத்துக்கள்", fbtn: "அனுப்புக", fhold: "இங்கே எழுதவும்...", share: "நண்பர்களுடன் பகிருங்கள்", est: "தொடக்கம்: செப்டம்பர் 2025" },
        "ENGLISH": { live: "LIVE NEWS", welcome: "Welcome to Ameer Azeem Global Media!", title: "ENGLISH GLOBAL NEWS LIVE", hint: "CLICK LOGO TO DOWNLOAD APP", ftitle: "FEEDBACK", fbtn: "SUBMIT", fhold: "Type here...", share: "SHARE WITH FRIENDS", est: "Established: September 2025" },
        "ARABIC": { live: "أخبار مباشرة", welcome: "مرحباً بكم في شبكة أمير عظيم الإعلامية!", title: "الأخبار العربية المباشرة", hint: "انقر فوق الشعار لتنزيل التطبيق", ftitle: "ملاحظات", fbtn: "إرسال", fhold: "اكتب هنا...", share: "شارك مع الأصدقاء", est: "تأسست: سبتمبر 2025" }
    };

    const channelMapping = {
        "TAMIL": ["sun-news.png.png", "polimer-news.png.png", "news-thanthi.png.png", "news-seven.png.png", "tamilnadu-news18.png.png", "sathiya-news.png.png", "jayapluse-news.png.png", "kalaigar- news.png.png", "malaimurasu-news.png.png", "tamil-news.png.png", "puthiya-thalaimurai-news.png.png"],
        "ENGLISH": ["cnn-english.png.png", "india-today-english.png.png", "wion-english.png.png", "first-post-english.png.png", "Sky-news-english.png.png", "dw-news-english.png.png", "al-Jazeera-english.png.png", "al-arabiya-english.png.png", "united-nations-english.png.png", "earch-cam.png.png", "cruxnews.png", "repulics-english.png.png", "Time-now-english.png.png", "ndtc-english.png.png"],
        "HINDI": ["aaj-tak-hindi-news.png.png", "abp-hindi-news.png.png", "z-news-hindi.png.png", "republic-bharath-news.png.png", "time-nowhindi-news.png.png", "tv9-hindi-news.png.png", "24-think-hindi -news.png.png", "dd-news-hindi.png.png", "dna-hindi-news.png.png"],
        "MALAYALAM": ["asianet-news.png.png", "twenty-four-news.png.png", "media-one-news.png", "reporter-news.png.png", "kairali-news.png", "news18 -malayalam.png", "big-tv-news.png"],
        "TELUGU": ["tv9-telugu-news.png.png", "ntv-telugu-news.png.png", "z-news-telugu.png.png", "abc-telugu-news.png.png", "tv5-news-telugu.png.png", "10tv-telugu-news.png.png", "hmtv-telugu-news.png.png", "bigtv-news-telugu.png.png"],
        "KANNADA": ["tv9-kanada-news.png.png", "news18-kanada.png.png", "news1st-kanada.png.png", "asianet-nwes-kanada.png.png"],
        "ARABIC": ["sky-news.png.png", "al-arabiya-news.png.png", "aljazeera-news.png.png", "france24-news.png.png", "al-quran-makkah.png.png", "arbic-alghad-news.png.png", "arabic-alaraby-news.png.png", "money-controal-arabic-news.png.png", "aljazeera- mubasher-news.png.png"]
    };

    async function fetchLatestApk() {
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
            const data = await res.json();
            const apk = data.assets.find(a => a.name.endsWith('.apk'));
            if (apk) document.getElementById('apk-download-link').href = apk.browser_download_url;
        } catch (e) { console.error("APK Link Error"); }
    }

    async function init() {
        await fetchLatestApk();
        const res = await fetch(GIST_URL + "?t=" + Date.now());
        allData = await res.json();
        loadNav();
        changeLanguage("TAMIL");
    }

    function loadNav() {
        const nav = document.getElementById('lang-nav');
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'lang-btn' + (cat === "TAMIL" ? " active-lang" : "");
            div.id = `btn-${cat}`;
            div.onclick = () => changeLanguage(cat);
            // மொழிகளுக்கான ஐகான் இல்லாததால் எழுத்து ஐகானாக மாற்றியுள்ளேன்
            div.innerHTML = `<div class="lang-circle">${cat.charAt(0)}</div><div class="lang-name">${cat}</div>`;
            nav.appendChild(div);
        });
    }

    function changeLanguage(lang) {
        const t = translations[lang] || translations["ENGLISH"];
        document.getElementById('lbl-live').innerText = t.live;
        document.getElementById('ticker-text').innerText = allData.admin_message || t.welcome;
        document.getElementById('section-title').innerText = t.title;
        document.getElementById('hint-text').innerText = t.hint;
        document.getElementById('f-title').innerText = t.ftitle;
        document.getElementById('f-btn').innerText = t.fbtn;
        document.getElementById('f-msg').placeholder = t.fhold;
        document.getElementById('est-date').innerText = t.est;

        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
        document.getElementById(`btn-${lang}`).classList.add('active-lang');

        const grid = document.getElementById('channel-list');
        grid.innerHTML = "";
        channelMapping[lang].forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.onclick = () => {
                const vid = allData[ch];
                if(vid) {
                    document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                    window.scrollTo({top: 250, behavior: 'smooth'});
                }
            };
            // உங்கள் கிட்ஹப் நேரடி லிங்க் மற்றும் ஸ்பேஸ் சரிசெய்தல்
            const chImg = (IMAGE_BASE + ch).replace(/ /g, "%20");
            card.innerHTML = `<img src="${chImg}" onerror="this.src='logo.png.png'">`;
            grid.appendChild(card);
        });
    }

    function sendF() {
        const msg = document.getElementById('f-msg').value;
        if(!msg) return;
        window.open(`https://t.me/AjiranGroup?text=${encodeURIComponent("FEEDBACK: " + msg)}`, '_blank');
        alert("Success! Message sent to Telegram.");
        document.getElementById('f-msg').value = "";
    }

    init();
</script>
</body>
</html>
