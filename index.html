<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ameer Azeem Global Media - Live TV</title>
    <style>
        :root { --primary-red: #ff0000; --bg-black: #020617; --card-bg: #0f172a; --accent-blue: #3b82f6; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 1. லோகோ & பர்னிங் எஃபெக்ட் */
        header { text-align: center; padding: 40px 20px; background: linear-gradient(to bottom, #111827, #000); border-bottom: 3px solid var(--primary-red); }
        .logo-container { display: inline-block; position: relative; }
        .logo { height: 120px; cursor: pointer; position: relative; z-index: 2; transition: 0.3s; }
        .logo-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; background: var(--primary-red); border-radius: 50%; filter: blur(40px); opacity: 0.5; animation: fire 1.5s infinite alternate; }
        @keyframes fire { from { transform: translate(-50%, -50%) scale(0.9); opacity: 0.4; } to { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; } }
        .dl-hint { color: #94a3b8; font-size: 13px; margin-top: 15px; font-weight: bold; }

        /* 2. ஓடும் செய்தி */
        .ticker-wrap { background: #111827; height: 45px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid #1e293b; }
        .ticker-label { background: var(--primary-red); padding: 0 15px; font-weight: 900; height: 100%; display: flex; align-items: center; font-size: 12px; }
        .ticker { white-space: nowrap; animation: marquee 25s linear infinite; padding-left: 20px; font-size: 15px; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 3. சிறிய & நகரும் மொழி வட்டங்கள் */
        .nav-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 20px; background: #0a0f1e; scrollbar-width: none; -ms-overflow-style: none; padding-left: 20px; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .lang-btn { text-align: center; cursor: pointer; opacity: 0.6; transition: 0.3s; min-width: 65px; }
        .lang-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #334155; background: #1e293b; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }
        .active-lang { opacity: 1; transform: scale(1.1); }
        .active-lang .lang-circle { border-color: var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue); }

        /* 4. பிளேயர் */
        .section-header { background: linear-gradient(90deg, #000, var(--primary-red), #000); padding: 12px; text-align: center; font-weight: bold; font-size: 13px; margin: 15px 0; }
        #player-container { width: 95%; max-width: 850px; margin: 0 auto; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; }
        iframe { width: 100%; height: 100%; border: none; }

        /* 5. கமிங் சூன் ஸ்லைடர் */
        .soon-box { padding: 20px; overflow-x: auto; display: flex; gap: 15px; scrollbar-width: none; }
        .soon-card { min-width: 130px; height: 180px; background: #0f172a; border-radius: 10px; position: relative; border: 1px solid #1e293b; opacity: 0.7; }
        .soon-label { position: absolute; top: 10px; right: 10px; background: orange; color: black; font-size: 8px; padding: 2px 5px; font-weight: bold; border-radius: 3px; }
        .soon-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        /* 6. சேனல் கிரிட் */
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 10px; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .channel-card { background: #0f172a; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid #1e293b; }
        .channel-card:hover { transform: scale(1.05); border-color: var(--accent-blue); }
        .channel-card img { width: 50px; height: 50px; object-fit: contain; }

        /* 7. சமூக வலைத்தள ஹப் */
        .hub-section { text-align: center; padding: 40px 20px; background: #000; border-top: 1px solid #1e293b; }
        .btn-grid { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .hub-btn { padding: 12px 20px; border-radius: 30px; color: white; text-decoration: none; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 8px; min-width: 160px; justify-content: center; }
        .wa-btn { background: #25d366; } .fb-btn { background: #1877f2; } .tg-btn { background: #0088cc; } .ig-btn { background: #e1306c; }

        footer { text-align: center; padding: 40px 20px; background: #030712; border-top: 1px solid #1e293b; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-glow"></div>
        <a href="javascript:void(0)" onclick="smartDownload()">
            <img src="logo.png.png" class="logo" alt="Ameer Azeem">
        </a>
    </div>
    <div class="dl-hint">ஆப்பை பதிவிறக்கம் செய்ய லோகோவை அழுத்தவும்</div>
</header>

<div class="ticker-wrap">
    <div class="ticker-label">நேரலை</div>
    <div class="ticker" id="ticker-text">Welcome to Ameer Azeem Global Network!</div>
</div>

<div class="nav-scroll" id="lang-nav"></div>

<div class="section-header" id="section-title">TAMIL LIVE NEWS</div>

<div id="player-container">
    <iframe id="main-player" src="https://www.youtube.com/embed/9M02G5c6x6w" allowfullscreen></iframe>
</div>

<div class="channel-grid" id="channel-list"></div>

<!-- 🌟 கமிங் சூன் ஸ்லைடர் -->
<div style="padding-left: 20px; color: #64748b; font-size: 12px; font-weight: bold;">OTHER CATEGORIES (COMING SOON)</div>
<div class="soon-box">
    <div class="soon-card"><div class="soon-label">SOON</div><img src="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/education.png"></div>
    <div class="soon-card"><div class="soon-label">SOON</div><img src="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/cinema.png"></div>
    <div class="soon-card"><div class="soon-label">SOON</div><img src="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/sports.png"></div>
    <div class="soon-card"><div class="soon-label">SOON</div><img src="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/cartoon.png"></div>
</div>

<div class="hub-section">
    <h3 style="font-size: 14px;">JOIN OUR TELEGRAM COMMUNITY</h3>
    <div class="btn-grid">
        <a href="https://t.me/ameerazeemgloballivechannel" class="hub-btn tg-btn">JOIN TELEGRAM</a>
        <a href="javascript:void(0)" onclick="shareNow('whatsapp')" class="hub-btn wa-btn">WhatsApp Share</a>
        <a href="javascript:void(0)" onclick="shareNow('facebook')" class="hub-btn fb-btn">Facebook Share</a>
        <a href="https://t.me/ameerazeemgloballivechannel" class="hub-btn ig-btn">Instagram Share</a>
    </div>
</div>

<footer>
    <a href="https://t.me/ameerazeemgloballivechannel" style="color: #3b82f6; text-decoration: none; border: 1px solid #3b82f6; padding: 8px 20px; border-radius: 20px; font-size: 12px;">SUPPORT & FEEDBACK</a>
    <p style="color: #475569; font-size: 11px; margin-top: 20px;">AMEER AZEEM GLOBAL MEDIA &copy; 2026</p>
</footer>

<script>
    const GIST_URL = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json";
    const IMG_BASE = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/";
    const CATEGORIES = ["TAMIL", "ENGLISH", "HINDI", "MALAYALAM", "TELUGU", "KANNADA", "ARABIC"];
    
    let allData = {};

    const mapping = {
        "TAMIL": ["sun-news.png.png", "polimer-news.png.png", "news-thanthi.png.png", "news-seven.png.png"],
        "ENGLISH": ["repulics-english.png.png", "Time-now-english.png.png", "india-today-english.png.png"],
        "HINDI": ["aaj-tak-hindi-news.png.png", "abp-hindi-news.png.png"],
        "MALAYALAM": ["asianet-news.png.png", "twenty-four-news.png.png"],
        "TELUGU": ["tv9-telugu-news.png.png", "ntv-telugu-news.png.png"],
        "KANNADA": ["tv9-kanada-news.png.png", "news18-kanada.png.png"],
        "ARABIC": ["sky-news.png.png", "aljazeera-news.png.png"]
    };

    async function init() {
        try {
            const res = await fetch(GIST_URL + "?t=" + Date.now());
            allData = await res.json();
            loadNav();
            changeLanguage("TAMIL");
        } catch(e) { console.error("Error"); }
    }

    function loadNav() {
        const nav = document.getElementById('lang-nav');
        CATEGORIES.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'lang-btn' + (cat === "TAMIL" ? " active-lang" : "");
            div.id = `btn-${cat}`;
            div.onclick = () => changeLanguage(cat);
            div.innerHTML = `<div class="lang-circle">${cat.charAt(0)}</div><div style="font-size:9px; margin-top:5px;">${cat}</div>`;
            nav.appendChild(div);
        });
    }

    function changeLanguage(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
        document.getElementById(`btn-${lang}`).classList.add('active-lang');
        document.getElementById('section-title').innerText = lang + " LIVE NEWS";
        
        const grid = document.getElementById('channel-list');
        grid.innerHTML = "";
        mapping[lang].forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.onclick = () => {
                const vid = allData[ch];
                if(vid) document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
                window.scrollTo({top: 200, behavior: 'smooth'});
            };
            card.innerHTML = `<img src="${(IMG_BASE+ch).replace(/ /g,"%20")}" onerror="this.src='logo.png.png'">`;
            grid.appendChild(card);
        });
    }

    function shareNow(p) {
        const url = window.location.href;
        const msg = encodeURIComponent("Watch Live TV in 7 Languages! ");
        if(p==='whatsapp') window.open(`https://api.whatsapp.com/send?text=${msg}${url}`);
        else window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`);
    }

    function smartDownload() {
        const ua = navigator.userAgent.toLowerCase();
        let baseUrl = "https://github.com/Ameer-Azeem-live-channels/ameer-azeem-live-/releases/download/v1.0/";
        let apk = "app-arm64-v8a-release.apk"; // New phones (Default)
        if (ua.indexOf("armeabi-v7a") > -1) apk = "app-armeabi-v7a-release.apk"; // Old phones
        else if (ua.indexOf("x86_64") > -1) apk = "app-x86_64-release.apk"; // Tablets/PC
        window.location.href = baseUrl + apk;
    }
    init();
</script>
</body>
</html>
