<style>
    :root { --primary-red: #b71c1c; --bg-black: #030712; --card-bg: #0f172a; --accent-blue: #3b82f6; }
    body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    
    /* லோகோ பகுதி */
    header { text-align: center; padding: 40px 20px; background: #000; border-bottom: 2px solid var(--primary-red); }
    .logo { height: 110px; cursor: pointer; transition: 0.4s; filter: drop-shadow(0 0 15px rgba(183,28,28,0.5)); }
    .logo:hover { transform: scale(1.1); }

    /* ஓடும் செய்தி */
    .ticker-wrap { background: #111827; height: 45px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .ticker-label { background: var(--primary-red); padding: 0 15px; font-weight: bold; height: 100%; display: flex; align-items: center; font-size: 13px; }
    .ticker { white-space: nowrap; animation: marquee 25s linear infinite; padding-left: 20px; font-size: 15px; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    /* மொழி தேர்வுகள் - GLOWING EFFECT */
    .nav-scroll { display: flex; overflow-x: auto; gap: 20px; padding: 30px; justify-content: center; background: #0a0f1e; }
    .lang-btn { text-align: center; cursor: pointer; transition: 0.3s; opacity: 0.6; }
    .lang-circle { 
        width: 80px; height: 80px; border-radius: 50%; 
        border: 2px solid #334155; padding: 3px; background: #000; 
        object-fit: cover; transition: 0.4s; 
    }
    .lang-btn:hover, .active-lang { opacity: 1; transform: scale(1.1); }
    
    /* ஒவ்வொரு மொழிக்கும் தனித்தனியான மின்னும் எஃபெக்ட் */
    .active-lang .lang-circle { border-color: var(--accent-blue); box-shadow: 0 0 20px var(--accent-blue); }
    .lang-name { font-size: 12px; margin-top: 10px; font-weight: bold; color: #94a3b8; text-transform: uppercase; }
    .active-lang .lang-name { color: var(--accent-blue); }

    /* பிளேயர் */
    #player-container { width: 90%; max-width: 950px; margin: 25px auto; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,1); }
    iframe { width: 100%; height: 100%; border: none; }

    /* சேனல் லிஸ்ட் */
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 25px; max-width: 1100px; margin: 0 auto; }
    .channel-card { 
        background: var(--card-bg); border-radius: 15px; padding: 12px; 
        text-align: center; cursor: pointer; transition: 0.3s; 
        border: 1px solid rgba(255,255,255,0.05); 
    }
    .channel-card:hover { transform: scale(1.1); border-color: var(--accent-blue); background: #1e293b; }
    .channel-card img { width: 65px; height: 65px; object-fit: contain; }

    /* ஷேர் & ஃபூட்டர் */
    .share-section { text-align: center; padding: 40px 20px; background: #000; border-top: 1px solid #1e293b; }
    .btn { padding: 12px 25px; border-radius: 30px; color: white; text-decoration: none; font-weight: bold; margin: 10px; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
    .wa { background: #25d366; } .fb { background: #1877f2; }
    
    footer { text-align: center; padding: 50px 20px; color: #64748b; font-size: 13px; }
    .est { color: var(--primary-red); font-weight: bold; font-size: 15px; margin-bottom: 10px; }
</style>
</head> <body>
<header> <a href="https://github.com/Ameer-Azeem-live-channels/ameer-azeem-live-/releases/download/v1.0/app-armeabi-v7a-release.apk"> <img src="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/assets/images/ameer%20azeem%20logo/logo.png.png" class="logo" alt="Ameer Azeem"> </a> </header>
<div class="ticker-wrap"> <div class="ticker-label" id="lbl-live">LIVE NEWS</div> <div class="ticker" id="ticker-text">Welcome to Ameer Azeem Global Media Network!</div> </div>
<div class="nav-scroll" id="lang-nav"></div>
<div id="player-container"> <iframe id="main-player" src="https://www.youtube.com/embed/9M02G5c6x6w" allowfullscreen></iframe> </div>
<div class="channel-grid" id="channel-list"></div>
<footer> <div id="est-date" class="est">Established: September 2025</div> <p>AMEER AZEEM GLOBAL MEDIA © 2026</p> <a href="https://t.me/AjiranGroup" style="color: #3b82f6; text-decoration: none; border: 1px solid #3b82f6; padding: 10px 20px; border-radius: 25px; display: inline-block; margin-top: 20px; font-weight: bold;">💬 SEND FEEDBACK</a> </footer>
<script> // கிட்ஹப் இமேஜ் லிங்குகள் சரிபார்க்கப்பட்டு இங்கே கொடுக்கப்பட்டுள்ளது const IMAGE_BASE = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/assets/images/"; const GIST_URL = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json";
let allData = {};
const categories = ["TAMIL", "ENGLISH", "HINDI", "MALAYALAM", "TELUGU", "KANNADA", "ARABIC"];

// உங்கள் கிட்ஹப் ஃபோல்டரில் உள்ள சரியான இமேஜ் பெயர்கள்
const langIcons = {
    "TAMIL": "languages/tamil.png",
    "ENGLISH": "languages/english.png",
    "HINDI": "languages/hindi.png",
    "MALAYALAM": "languages/malayalam.png",
    "TELUGU": "languages/telugu.png",
    "KANNADA": "languages/kanada.png",
    "ARABIC": "languages/arabic.png"
};

const channelMapping = {
    "TAMIL": ["sun-news.png.png", "news-seven.png.png", "tamil-news.png.png", "news-thanthi.png.png", "polimer-news.png.png", "sathiya-news.png.png", "jayapluse-news.png.png", "kalaigar- news.png.png", "malaimurasu-news.png.png", "tamilnadu-news18.png.png", "puthiya-thalaimurai-news.png.png"],
    "ENGLISH": ["repulics-english.png.png", "Time-now-english.png.png", "ndtc-english.png.png", "india-today-english.png.png", "cnn-english.png.png", "wion-english.png.png", "Sky-news-english.png.png", "dw-news-english.png.png", "al-Jazeera-english.png.png", "al-arabiya-english.png.png", "first-post-english.png.png", "united-nations-english.png.png", "earch-cam.png.png", "cruxnews.png"],
    "HINDI": ["aaj-tak-hindi-news.png.png", "abp-hindi-news.png.png", "z-news-hindi.png.png", "india-today-news.png.png", "cnn-hindi-news18.png.png", "republic-bharath-news.png.png", "time-nowhindi-news.png.png", "tv9-hindi-news.png.png", "24-think-hindi -news.png.png", "dd-news-hindi.png.png", "dna-hindi-news.png.png"],
    "MALAYALAM": ["asianet-news.png.png", "twenty-four-news.png.png", "media-one-news.png", "reporter-news.png.png", "kairali-news.png", "news18 -malayalam.png", "big-tv-news.png"],
    "TELUGU": ["tv9-telugu-news.png.png", "ntv-telugu-news.png.png", "z-news-telugu.png.png", "abc-telugu-news.png.png", "tv5-news-telugu.png.png", "10tv-telugu-news.png.png", "hmtv-telugu-news.png.png", "bigtv-news-telugu.png.png"],
    "KANNADA": ["tv9-kanada-news.png.png", "news18-kanada.png.png", "news1st-kanada.png.png", "asianet-nwes-kanada.png.png"],
    "ARABIC": ["sky-news.png.png", "al-arabiya-news.png.png", "aljazeera-news.png.png", "france24-news.png.png", "al-quran-makkah.png.png", "arbic-alghad-news.png.png", "arabic-alaraby-news.png.png", "money-controal-arabic-news.png.png", "aljazeera- mubasher-news.png.png"]
};

async function init() {
    try {
        const res = await fetch(GIST_URL + "?t=" + Date.now());
        allData = await res.json();
        loadNav();
        loadChannels("TAMIL");
    } catch (e) { console.error("Init Error"); }
}

function loadNav() {
    const nav = document.getElementById('lang-nav');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'lang-btn' + (cat === "TAMIL" ? " active-lang" : "");
        div.id = `btn-${cat}`;
        div.onclick = () => {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
            div.classList.add('active-lang');
            loadChannels(cat);
        };
        // இமேஜ் லிங்க் இடைவெளிகளை (Spaces) %20 என மாற்றுகிறது
        const imgUrl = (IMAGE_BASE + langIcons[cat]).replace(/ /g, "%20");
        div.innerHTML = `<img src="${imgUrl}" class="lang-circle"><div class="lang-name">${cat}</div>`;
        nav.appendChild(div);
    });
}

function loadChannels(lang) {
    const grid = document.getElementById('channel-list');
    grid.innerHTML = "";
    const folder = lang.toLowerCase() + "channels/";
    channelMapping[lang].forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.onclick = () => {
            const vid = allData[ch];
            if(vid) document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            window.scrollTo({top: 150, behavior: 'smooth'});
        };
        const chImg = (IMAGE_BASE + folder + ch).replace(/ /g, "%20");
        card.innerHTML = `<img src="${chImg}" onerror="this.src='${IMAGE_BASE.replace(/ /g, "%20")}ameer%20azeem%20logo/logo.png.png'">`;
        grid.appendChild(card);
    });
}

init();
</script> </body> </html>
