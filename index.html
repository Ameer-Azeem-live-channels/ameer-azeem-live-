<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ameer Azeem Global Media - Live TV</title>
    
    <!-- சோசியல் மீடியா லிங்க் ப்ரிவியூ -->
    <meta property="og:title" content="Ameer Azeem Global Media">
    <meta property="og:description" content="Watch 65+ Live Channels. Join our Community & Download App!">
    <meta property="og:image" content="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/logo.png.png">

    <style>
        :root { --primary-red: #ff0000; --bg-black: #020617; --card-bg: #0f172a; --accent-blue: #3b82f6; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { text-align: center; padding: 40px 20px; background: linear-gradient(to bottom, #111827, #000); border-bottom: 3px solid var(--primary-red); }
        .logo-container { display: inline-block; position: relative; }
        .logo { 
            height: 130px; cursor: pointer; position: relative; z-index: 2;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; background: var(--primary-red);
            border-radius: 50%; filter: blur(40px); opacity: 0.6; z-index: 1;
            animation: fireBlink 1.5s infinite alternate;
        }
        @keyframes fireBlink {
            0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 40px var(--primary-red); }
        }

        .ticker-wrap { background: #111827; height: 50px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid #1e293b; }
        .ticker-label { background: var(--primary-red); padding: 0 20px; font-weight: 900; height: 100%; display: flex; align-items: center; font-size: 13px; z-index: 10; }
        .ticker { white-space: nowrap; animation: marquee 25s linear infinite; padding-left: 20px; font-size: 16px; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* சிறிய மற்றும் நகரும் மொழி பட்டன்கள் (Smaller & Sliding Nav) */
        .nav-scroll { 
            display: flex; overflow-x: auto; gap: 15px; padding: 20px; 
            background: #0a0f1e; scrollbar-width: none; -ms-overflow-style: none;
            justify-content: flex-start; /* மொபைலில் நகர்த்த ஏதுவாக இடது பக்கம் */
        }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .lang-btn { text-align: center; cursor: pointer; opacity: 0.6; transition: 0.4s; min-width: 70px; }
        .lang-circle { 
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid #334155; 
            background: #1e293b; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; font-size: 18px; color: #fff;
        }
        .active-lang { opacity: 1; transform: scale(1.05); }
        .active-lang .lang-circle { border-color: var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue); }

        #player-container { width: 95%; max-width: 900px; margin: 20px auto; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }

        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .channel-card { background: var(--card-bg); border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .channel-card img { width: 55px; height: 55px; object-fit: contain; }

        /* சமூக வலைத்தளங்கள் & டெலிகிராம் ஹப் */
        .hub-section { text-align: center; padding: 40px 20px; background: #000; }
        .btn-grid { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .hub-btn { padding: 12px 25px; border-radius: 30px; color: white; text-decoration: none; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 8px; min-width: 180px; justify-content: center; }
        
        .wa-btn { background: #25d366; } 
        .fb-btn { background: #1877f2; } 
        .tg-btn { background: #0088cc; } 

        footer { text-align: center; padding: 40px 20px; background: #030712; border-top: 1px solid #1e293b; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-glow"></div>
        <!-- லோகோவை அழுத்தினால் ஏபிகே டவுன்லோட் ஆகும் -->
        <a href="javascript:void(0)" onclick="smartDownload()" title="Download Official App">
            <img src="logo.png.png" class="logo" alt="Ameer Azeem">
        </a>
    </div>
    <div style="color: #94a3b8; font-size: 14px; margin-top: 15px; font-weight: bold;">ஆப்பை டவுன்லோட் செய்ய லோகோவை அழுத்தவும்</div>
</header>

<div class="ticker-wrap">
    <div class="ticker-label" id="lbl-live">நேரலை</div>
    <div class="ticker" id="ticker-text">அமீர் அஜீம் மீடியா நெட்வொர்க்கிற்கு உங்களை வரவேற்கிறோம்!</div>
</div>

<div class="nav-scroll" id="lang-nav"></div>

<div id="player-container">
    <iframe id="main-player" src="https://www.youtube.com/embed/9M02G5c6x6w" allowfullscreen></iframe>
</div>

<div class="channel-grid" id="channel-list"></div>

<div class="hub-section">
    <h3>JOIN OUR OFFICIAL COMMUNITY</h3>
    <div class="btn-grid">
        <a href="https://t.me/ameerazeemgloballivechannel" class="hub-btn tg-btn">JOIN TELEGRAM HUB</a>
        <a href="javascript:void(0)" onclick="shareWebsite('whatsapp')" class="hub-btn wa-btn">WhatsApp Share</a>
        <a href="javascript:void(0)" onclick="shareWebsite('facebook')" class="hub-btn fb-btn">Facebook Share</a>
    </div>
</div>

<footer>
    <p>AMEER AZEEM GLOBAL MEDIA &copy; 2026</p>
    <!-- ஃபீட்பேக் நேரடியாக டெலிகிராமிற்கு -->
    <a href="https://t.me/ameerazeemgloballivechannel" style="color: #3b82f6; text-decoration: none; border: 1px solid #3b82f6; padding: 10px 25px; border-radius: 30px; display: inline-block;">SUPPORT & FEEDBACK</a>
</footer>

<script>
    const TG_LINK = "https://t.me/ameerazeemgloballivechannel";
    const GIST_URL = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json";
    const IMAGE_BASE = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/";
    
    let allData = {};
    const categories = ["TAMIL", "ENGLISH", "HINDI", "MALAYALAM", "TELUGU", "KANNADA", "ARABIC"];

    const channelMapping = {
        "TAMIL": ["sun-news.png.png", "news-seven.png.png", "tamil-news.png.png", "news-thanthi.png.png", "polimer-news.png.png", "sathiya-news.png.png"],
        "ENGLISH": ["repulics-english.png.png", "Time-now-english.png.png", "india-today-english.png.png", "cnn-english.png.png"],
        "HINDI": ["aaj-tak-hindi-news.png.png", "abp-hindi-news.png.png"],
        "MALAYALAM": ["asianet-news.png.png", "twenty-four-news.png.png"],
        "TELUGU": ["tv9-telugu-news.png.png", "ntv-telugu-news.png.png"],
        "KANNADA": ["tv9-kanada-news.png.png", "news18-kanada.png.png"],
        "ARABIC": ["sky-news.png.png", "al-arabiya-news.png.png", "aljazeera-news.png.png"]
    };

    async function init() {
        try {
            const resData = await fetch(GIST_URL + "?t=" + Date.now());
            allData = await resData.json();
            loadNav();
            changeLanguage("TAMIL");
        } catch(e) { console.error("Load Error"); }
    }

    function loadNav() {
        const nav = document.getElementById('lang-nav');
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'lang-btn' + (cat === "TAMIL" ? " active-lang" : "");
            div.id = `btn-${cat}`;
            div.onclick = () => changeLanguage(cat);
            div.innerHTML = `<div class="lang-circle">${cat.charAt(0)}</div><div style="font-size:10px; margin-top:5px;">${cat}</div>`;
            nav.appendChild(div);
        });
    }

    function changeLanguage(lang) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
        document.getElementById(`btn-${lang}`).classList.add('active-lang');

        const grid = document.getElementById('channel-list');
        grid.innerHTML = "";
        channelMapping[lang].forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.onclick = () => {
                const vid = allData[ch];
                if(vid) document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            };
            const chImg = (IMAGE_BASE + ch).replace(/ /g, "%20");
            card.innerHTML = `<img src="${chImg}" onerror="this.src='logo.png.png'">`;
            grid.appendChild(card);
        });
    }

    // ஷேர் வசதி - வெப்சைட் லிங்க்கை ஷேர் செய்யும்
    function shareWebsite(platform) {
        const url = window.location.href;
        const text = encodeURIComponent("Watch 7 Languages Live TV! Join our community: ");
        if(platform === 'whatsapp') window.open(`https://api.whatsapp.com/send?text=${text}${url}`);
        if(platform === 'facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`);
    }

    // ஸ்மார்ட் டவுன்லோட் - லோகோவை அழுத்தினால் வேலை செய்யும்
    function smartDownload() {
        const ua = navigator.userAgent.toLowerCase();
        let apk = "app-arm64-v8a-release.apk"; // New phones
        if (ua.indexOf("armeabi-v7a") > -1) apk = "app-armeabi-v7a-release.apk"; // Old phones
        
        window.location.href = `https://github.com/Ameer-Azeem-live-channels/ameer-azeem-live-/releases/download/v1.0/${apk}`;
    }

    init();
</script>
</body>
</html>
