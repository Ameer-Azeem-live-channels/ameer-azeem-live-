<!DOCTYPE html> <html lang="ta"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Ameer Azeem Global - World Class Media Gateway</title>
<meta property="og:title" content="Ameer Azeem Global Live - 100+ Channels">
<meta property="og:description" content="7 Languages. News & Entertainment. Install our official app now!">
<meta property="og:image" content="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-channels/main/assets/images/ameer%20azeem%20logo/logo.png.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    :root { --primary: #ef4444; --bg: #020617; --card: #111827; --accent: #0ea5e9; }
    * { box-sizing: border-box; transition: 0.3s; }
    body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
    
    .navbar { display: flex; justify-content: center; align-items: center; padding: 15px; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px); position: fixed; width: 100%; top: 0; z-index: 2000; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo-img { height: 50px; filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.4)); }

    .slider-container { margin-top: 80px; width: 100%; height: 300px; overflow: hidden; position: relative; border-bottom: 3px solid var(--primary); }
    .slider { display: flex; width: 400%; height: 100%; transition: 0.8s ease-in-out; }
    .slide { width: 100%; height: 100%; flex-shrink: 0; background-size: cover; background-position: center; }

    .hero { padding: 40px 5%; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
    h1 { font-size: clamp(24px, 5vw, 45px); font-weight: 900; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .dl-btn { background: white; color: black !important; padding: 20px 45px; border-radius: 60px; font-size: 18px; font-weight: 900; text-decoration: none; display: inline-flex; align-items: center; gap: 15px; margin: 20px 0; box-shadow: 0 20px 60px rgba(239, 68, 68, 0.3); border: 2px solid white; cursor: pointer; }
    .dl-btn:hover { background: var(--primary); color: white !important; transform: translateY(-5px); }

    .lang-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 20px; background: #0f172a; margin: 20px 0; }
    .l-btn { padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; cursor: pointer; font-weight: bold; font-size: 12px; }
    .l-btn.active, .l-btn:hover { background: var(--primary); border-color: var(--primary); }

    .stage { max-width: 950px; margin: 20px auto; padding: 20px; background: #000; border-radius: 40px; border: 1px solid #334155; }
    .player-wrap { width: 100%; height: 500px; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 25px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
    .card { background: var(--card); padding: 15px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
    .card img { width: 100%; border-radius: 12px; height: 60px; object-fit: contain; }
    .ch-name { font-size: 9px; font-weight: bold; color: #64748b; margin-top: 8px; }

    .footer { padding: 60px 5%; background: #000; border-top: 1px solid rgba(255,255,255,0.1); }
    @media (max-width: 768px) { .player-wrap { height: 250px; } .slider-container { height: 180px; } }
</style>
</head> <body>
<nav class="navbar"> <img src="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-channels/main/assets/images/ameer%20azeem%20logo/logo.png.png" class="logo-img"> </nav>
<div class="slider-container"> <div class="slider" id="mainSlider"> <div class="slide" style="background-image: url('https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-channels/main/assets/images/banner/banner1.png');"></div> <div class="slide" style="background-image: url('https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-channels/main/assets/images/banner/banner2.png');"></div> <div class="slide" style="background-image: url('https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-channels/main/assets/images/banner/banner3.png');"></div> </div> </div>
<section class="hero"> <h1 id="h1">அமீர் அஜீம் குளோபல் - நேரலை மையம்</h1> <a href="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/app-release.apk" class="dl-btn" id="dlText"> <i class="fab fa-android"></i> அதிகாரப்பூர்வ ஆப்பை இன்ஸ்டால் செய் </a> </section>
<div class="lang-bar"> <button class="l-btn active" id="btn_ta" onclick="changeCategory('ta')">தமிழ்</button> <button class="l-btn" id="btn_en" onclick="changeCategory('en')">English</button> <button class="l-btn" id="btn_ar" onclick="changeCategory('ar')">العربية</button> <button class="l-btn" id="btn_ml" onclick="changeCategory('ml')">മലയാളം</button> <button class="l-btn" id="btn_te" onclick="changeCategory('te')">తెలుగు</button> <button class="l-btn" id="btn_kn" onclick="changeCategory('kn')">ಕನ್ನಡ</button> <button class="l-btn" id="btn_hi" onclick="changeCategory('hi')">हिन्दी</button> </div>
<div class="stage"> <div class="player-wrap"> <iframe id="masterVid" src="https://www.youtube.com/embed/live_stream?channel=UCYlh4lH762HvHt6mmiecyWQ&autoplay=1&origin=https://ameer-azeem-live-channels.github.io" allowfullscreen></iframe> </div> <div class="grid" id="channelGrid"></div> </div>
<footer class="footer"> <p style="color: #64748b;">Contact: jahanshathik@gmail.com</p> <p style="font-size: 12px; color: #334155;">© 2024 Ameer Azeem Global Media Group.</p> </footer>
<script> const GIST_URL = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json"; const IMG_ROOT = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-channels/main/assets/images/"; const APP_LOGO = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-channels/main/assets/images/ameer%20azeem%20logo/logo.png.png";
const channels = {
    ta: { folder: "tamilchannels/", list: [{n:"SUN NEWS", i:"sun-news.png.png", id:"UCYlh4lH762HvHt6mmiecyWQ"}, {n:"POLIMER", i:"polimer-news.png.png", id:"UC8Z-VjXBtDJTvq6aqkIskPg"}, {n:"THANTHI", i:"news-thanthi.png.png", id:"UC-JFyL0zDFOsPMpuWu39rPA"}] },
    en: { folder: "englishchannels/", list: [{n:"AL JAZEERA", i:"al-Jazeera-english.png.png", id:"UCNye-wNBqNL5ZzHSJj3l8Bg"}, {n:"SKY NEWS", i:"Sky-news-english.png.png", id:"UC7E-C2vH6SIn2vXU_p5_fFw"}] },
    ar: { folder: "arabicchannels/", list: [{n:"AL ARABIYA", i:"al-arabiya-news.png.png", id:"UCahpxixMCwoANA7VsqnshU"}, {n:"AL JAZEERA", i:"aljazeera-news.png.png", id:"UCfiwzLy-8yKzIeh7Acl50_g"}] }
};

let currentLang = 'ta';
let gistData = {};

async function init() {
    try {
        const res = await fetch(GIST_URL + "?t=" + Date.now());
        gistData = await res.json();
        renderGrid();
    } catch (e) { renderGrid(); }
}

function renderGrid() {
    const grid = document.getElementById('channelGrid');
    const data = channels[currentLang] || channels['ta'];
    grid.innerHTML = "";
    data.list.forEach(ch => {
        const vidId = gistData[ch.i] || ch.id;
        grid.innerHTML += `
            <div class="card" onclick="play('${vidId}')">
                <img src="${IMG_ROOT}${data.folder}${ch.i}" onerror="this.src='${APP_LOGO}'">
                <div class="ch-name">${ch.n}</div>
            </div>`;
    });
}

function play(id) {
    let url = id.length === 11 ? "https://www.youtube.com/embed/" + id : "https://www.youtube.com/embed/live_stream?channel=" + id;
    document.getElementById('masterVid').src = url + "?autoplay=1&origin=https://ameer-azeem-live-channels.github.io";
    window.scrollTo({top: 400, behavior: 'smooth'});
}

function changeCategory(l) {
    currentLang = l;
    document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn_' + l).classList.add('active');
    renderGrid();
}

// Slider
let sIdx = 0;
setInterval(() => { sIdx = (sIdx + 1) % 3; document.getElementById('mainSlider').style.transform = `translateX(-${sIdx * 100}%)`; }, 4000);

window.onload = init;
</script> </body> </html>
