        .nav-brand { font-weight: 700; font-size: 16px; color: #fff; letter-spacing: 1px; width: 100%; text-align: center; }

        .banner-hero { margin-top: 50px; width: 100%; height: 380px; background: url('banner2.png') no-repeat center center; background-size: cover; border-bottom: 3px solid #333; background-color: #000; }

        .logo-zone { padding: 40px 5%; background: #000; }
        .logo-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto; cursor: pointer; display: block; text-decoration: none; }
        .logo-main { width: 100%; z-index: 10; position: relative; animation: glossy-shine 3s infinite; }
        @keyframes glossy-shine { 50% { filter: brightness(1.4) drop-shadow(0 0 30px var(--primary)); } }
        .fire-flash { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 160%; height: 180%; background: radial-gradient(circle, var(--fire) 0%, transparent 70%); border-radius: 50%; opacity: 0; pointer-events: none; }
        .logo-wrap:active .fire-flash { animation: burst 0.5s ease-out; }
        @keyframes burst { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(3); opacity: 0; } }

        .lang-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 30px 5%; background: #000; }
        .l-btn { padding: 10px 20px; border-radius: 30px; border: 1px solid #444; background: transparent; color: #a1a1a6; cursor: pointer; font-weight: 600; font-size: 12px; }
        .l-btn.active, .l-btn:hover { background: #fff; color: #000; border-color: #fff; transform: scale(1.1); }

        .stage { max-width: 1050px; margin: 30px auto; padding: 25px; background: #1c1c1e; border-radius: 45px; box-shadow: 0 40px 100px rgba(0,0,0,0.9); }
        .player-wrap { width: 100%; height: 520px; border-radius: 25px; overflow: hidden; background: #000; margin-bottom: 30px; border: 1px solid #333; }
        
        .interact { padding: 60px 8%; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .box { background: #1c1c1e; padding: 40px; border-radius: 40px; text-align: left; border: 1px solid #333; }
        .s-btn { padding: 15px 25px; border-radius: 15px; color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 12px; font-weight: 700; margin-top: 15px; }
        
        input, textarea { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; }
        .footer { padding: 80px; border-top: 1px solid #333; color: #666; font-size: 12px; }
        @media (max-width: 768px) { .player-wrap { height: 240px; } .banner-hero { height: 200px; } }
    </style>
</head>

<script>
    const GIST = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json";
    const masterData = {
        ta: { nav: "அமீர் அஜீம் குளோபல் மீடியா", act: "லோகோவை அழுத்தவும்", group: "குழுவில் இணையுங்கள்", share: "பகிருங்கள்", feed: "உங்கள் கருத்துக்கள்", pt: "நாங்கள் ஒரு டிஜிட்டல் தொகுப்பாளர் மட்டுமே." },
        en: { nav: "AMEER AZEEM GLOBAL MEDIA", act: "CLICK LOGO TO DOWNLOAD", group: "Join Communities", share: "Share Gateway", feed: "Your Feedback", pt: "We are a digital media aggregator." }
    };

    const channelData = {
        ta: [{n:"SUN NEWS", i:"sun-news.png.png", id:"UCYlh4lH762HvHt6mmiecyWQ"}, {n:"POLIMER", i:"polimer-news.png.png", id:"UC8Z-VjXBtDJTvq6aqkIskPg"}],
        en: [{n:"AL JAZEERA", i:"al-Jazeera-english.png.png", id:"UCNye-wNBqNL5ZzHSJj3l8Bg"}, {n:"SKY NEWS", i:"Sky-news-english.png.png", id:"UC7E-C2vH6SIn2vXU_p5_fFw"}]
    };

    let curL = 'ta'; let gCache = {};
    async function init() { try { const r = await fetch(GIST + "?t=" + Date.now()); gCache = await r.json(); } catch(e) {} renderGrid(); }

    function renderGrid() {
        const grid = document.getElementById('channelGrid');
        const data = channelData[curL] || channelData['ta'];
        grid.innerHTML = "";
        data.forEach(c => {
            const vid = gCache[c.i] || c.id;
            grid.innerHTML += `<div style="background:#2c2c2e; padding:15px; border-radius:20px; cursor:pointer;" onclick="play('${vid}')">
                <img src="${c.i}" style="width:100%; height:60px; object-fit:contain;" onerror="this.src='logo.png.png'">
                <div style="font-size:10px; margin-top:10px; color:#aaa;">${c.n}</div>
            </div>`;
        });
    }

    function play(id) {
        document.getElementById('vid').src = "https://www.youtube.com/embed/" + (id.length === 11 ? id : "live_stream?channel="+id) + "?autoplay=1";
        window.scrollTo({top: 500, behavior: 'smooth'});
    }

    function changeGlobalUI(l) {
        curL = l; const d = masterData[l] || masterData['en'];
        document.getElementById('navBrand').innerText = d.nav;
        document.getElementById('act1').innerText = d.act;
        document.getElementById('h3_group').innerText = d.group;
        document.getElementById('h3_share').innerText = d.share;
        document.getElementById('h3_feed').innerText = d.feed;
        document.getElementById('pText').innerText = d.pt;
        renderGrid();
    }
    window.onload = init;
</script>
