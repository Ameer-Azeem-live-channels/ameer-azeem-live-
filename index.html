<style>

    /* ஓடும் செய்தி */
    .ticker-wrap { background: #111827; height: 45px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .ticker-label { background: var(--primary-red); padding: 0 15px; font-weight: bold; height: 100%; display: flex; align-items: center; font-size: 13px; z-index: 10; }
    .ticker { white-space: nowrap; animation: marquee 30s linear infinite; padding-left: 20px; font-size: 15px; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    /* மொழி தேர்வுகள் */
    .nav-scroll { display: flex; overflow-x: auto; gap: 20px; padding: 25px; justify-content: center; background: #0a0f1e; }
    .lang-btn { text-align: center; cursor: pointer; opacity: 0.6; transition: 0.3s; }
    .lang-circle { 
        width: 75px; height: 75px; border-radius: 50%; border: 2px solid #334155; 
        padding: 3px; background: #1e293b; display: flex; align-items: center; 
        justify-content: center; font-weight: 900; font-size: 24px;
    }
    .active-lang { opacity: 1; transform: scale(1.1); }
    .active-lang .lang-circle { border-color: var(--accent-blue); box-shadow: 0 0 20px var(--accent-blue); color: var(--accent-blue); }
    .lang-name { font-size: 12px; margin-top: 10px; font-weight: bold; text-transform: uppercase; }

    /* பிளேயர் செக்ஷன் */
    .section-header { background: linear-gradient(90deg, #000, var(--primary-red), #000); padding: 15px; text-align: center; font-weight: 900; letter-spacing: 2px; font-size: 14px; margin-bottom: 20px; text-transform: uppercase; }
    #player-container { width: 95%; max-width: 950px; margin: 0 auto; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    iframe { width: 100%; height: 100%; border: none; }

    /* சேனல் லிஸ்ட் */
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding: 30px 20px; max-width: 1100px; margin: 0 auto; }
    .channel-card { background: var(--card-bg); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
    .channel-card img { width: 65px; height: 65px; object-fit: contain; }

    /* --- 🌟 புதிய ஷேர் ஹப் (Dedicated Share Section) --- */
    .share-hub { 
        background: #0f172a; 
        margin: 40px auto; 
        padding: 30px; 
        max-width: 800px; 
        border-radius: 30px; 
        text-align: center; 
        border: 1px solid #1e293b;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .share-hub h3 { margin-bottom: 25px; color: var(--accent-blue); letter-spacing: 1px; }
    .share-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
    .share-item { 
        padding: 15px 30px; 
        border-radius: 50px; 
        color: white; 
        text-decoration: none; 
        font-weight: bold; 
        font-size: 14px; 
        display: flex; 
        align-items: center; 
        gap: 10px; 
        transition: 0.3s;
    }
    .share-item:hover { transform: translateY(-5px); filter: brightness(1.2); }
    
    .wa-btn { background: #25d366; } 
    .fb-btn { background: #1877f2; } 
    .tg-btn { background: #0088cc; } 
    .ig-btn { background: var(--insta-color); }

    footer { text-align: center; padding: 50px 20px; color: #64748b; font-size: 13px; }
    .est { color: var(--primary-red); font-weight: bold; margin-bottom: 10px; }
    .f-btn { color: #3b82f6; text-decoration: none; border: 1px solid #3b82f6; padding: 10px 25px; border-radius: 30px; display: inline-block; margin-top: 20px; font-weight: bold; }

    @media (max-width: 600px) {
        .nav-scroll { justify-content: flex-start; }
        .share-item { width: 100%; justify-content: center; }
    }
</style>

<script> const REPO = "Ameer-Azeem-live-channels/ameer-azeem-live-"; const GIST_URL = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json"; const IMAGE_BASE = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/"; const TG_LINK = "https://t.me/AjiranGroup";
let allData = {};
const categories = ["TAMIL", "ENGLISH", "HINDI", "MALAYALAM", "TELUGU", "KANNADA", "ARABIC"];

const translations = {
    "TAMIL": { live: "நேரலை", title: "தமிழ் நேரலை செய்திகள்", welcome: "அமீர் அஜீம் மீடியா நெட்வொர்க்கிற்கு உங்களை வரவேற்கிறோம்!", dl: "ஆப்பை பதிவிறக்கம் செய்ய லோகோவை அழுத்தவும்", share: "நண்பர்களுடன் பகிருங்கள்", feedback: "💬 கருத்துக்களை அனுப்பவும்", est: "தொடக்கம்: செப்டம்பர் 2025" },
    "ENGLISH": { live: "LIVE", title: "ENGLISH GLOBAL NEWS LIVE", welcome: "Welcome to Ameer Azeem Global Media Network!", dl: "CLICK LOGO TO DOWNLOAD APP", share: "CONNECT & SHARE", feedback: "💬 SEND FEEDBACK", est: "Established: September 2025" }
};

const channelMapping = {
    "TAMIL": ["sun-news.png.png", "news-seven.png.png", "tamil-news.png.png", "news-thanthi.png.png", "polimer-news.png.png", "sathiya-news.png.png", "jayapluse-news.png.png", "kalaigar- news.png.png", "malaimurasu-news.png.png", "tamil-news.png.png", "tamilnadu-news18.png.png", "puthiya-thalaimurai-news.png.png"],
    "ENGLISH": ["repulics-english.png.png", "Time-now-english.png.png", "ndtc-english.png.png", "india-today-english.png.png", "cnn-english.png.png", "wion-english.png.png", "Sky-news-english.png.png", "dw-news-english.png.png", "al-Jazeera-english.png.png", "al-arabiya-english.png.png", "first-post-english.png.png", "united-nations-english.png.png", "earch-cam.png.png", "cruxnews.png"],
    "HINDI": ["aaj-tak-hindi-news.png.png", "abp-hindi-news.png.png", "z-news-hindi.png.png", "republic-bharath-news.png.png", "time-nowhindi-news.png.png", "tv9-hindi-news.png.png", "24-think-hindi -news.png.png", "dd-news-hindi.png.png", "dna-hindi-news.png.png"],
    "MALAYALAM": ["asianet-news.png.png", "twenty-four-news.png.png", "media-one-news.png", "reporter-news.png.png", "kairali-news.png", "news18 -malayalam.png", "big-tv-news.png"],
    "TELUGU": ["tv9-telugu-news.png.png", "ntv-telugu-news.png.png", "z-news-telugu.png.png", "abc-telugu-news.png.png", "tv5-news-telugu.png.png", "10tv-telugu-news.png.png", "hmtv-telugu-news.png.png", "bigtv-news-telugu.png.png"],
    "KANNADA": ["tv9-kanada-news.png.png", "news18-kanada.png.png", "news1st-kanada.png.png", "asianet-nwes-kanada.png.png"],
    "ARABIC": ["sky-news.png.png", "al-arabiya-news.png.png", "aljazeera-news.png.png", "france24-news.png.png", "al-quran-makkah.png.png", "arbic-alghad-news.png.png", "arabic-alaraby-news.png.png", "money-controal-arabic-news.png.png", "aljazeera- mubasher-news.png.png"]
};

async function init() {
    try {
        const resApk = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
        const apkData = await resApk.json();
        const apkAsset = apkData.assets.find(a => a.name.endsWith('.apk'));
        if(apkAsset) document.getElementById('apk-dl').href = apkAsset.browser_download_url;

        const resData = await fetch(GIST_URL + "?t=" + Date.now());
        allData = await resData.json();
        loadNav();
        changeLanguage("TAMIL");
    } catch(e) { console.error("Init Error"); }
}

function loadNav() {
    const nav = document.getElementById('lang-nav');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'lang-btn' + (cat === "TAMIL" ? " active-lang" : "");
        div.id = `btn-${cat}`;
        div.onclick = () => changeLanguage(cat);
        div.innerHTML = `<div class="lang-circle">${cat.charAt(0)}</div><div class="lang-name">${cat}</div>`;
        nav.appendChild(div);
    });
}

function changeLanguage(lang) {
    const t = translations[lang] || translations["ENGLISH"];
    document.getElementById('lbl-live').innerText = t.live;
    document.getElementById('ticker-text').innerText = allData.admin_message || t.welcome;
    document.getElementById('section-title').innerText = t.title;
    document.getElementById('txt-dl-hint').innerText = t.dl;
    document.getElementById('share-hub-title').innerText = t.share;
    document.getElementById('btn-feedback').innerText = t.feedback;
    document.getElementById('est-date').innerText = t.est;

    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
    document.getElementById(`btn-${lang}`).classList.add('active-lang');

    const grid = document.getElementById('channel-list');
    grid.innerHTML = "";
    channelMapping[lang].forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.onclick = () => {
            const vid = allData[ch];
            if(vid) document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            window.scrollTo({top: 150, behavior: 'smooth'});
        };
        const chImg = (IMAGE_BASE + ch).replace(/ /g, "%20");
        card.innerHTML = `<img src="${chImg}" onerror="this.src='logo.png.png'">`;
        grid.appendChild(card);
    });

    const siteUrl = window.location.href;
    const msg = encodeURIComponent(`பாருங்கள் அமீர் அஜீம் நேரலை டிவி! \nஇணையதளம்: ${siteUrl} \nடெலிகிராம்: ${TG_LINK}`);
    document.getElementById('wa-share').href = `https://api.whatsapp.com/send?text=${msg}`;
    document.getElementById('fb-share').href = `https://www.facebook.com/sharer/sharer.php?u=${siteUrl}`;
}

init();
</script> </body> </html>
