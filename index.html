<!DOCTYPE html> <html lang="ta"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Ameer Azeem Global Media</title> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <style> :root { --primary: #ef4444; --bg: #000; --card: #1c1c1e; --accent: #0071e3; --fire: #ff4500; } body { background-color: var(--bg); color: #fff; font-family: -apple-system, sans-serif; text-align: center; margin: 0; padding: 0; } .navbar { padding: 15px; border-bottom: 1px solid #333; background: rgba(0,0,0,0.8); position: fixed; width:100%; top:0; z-index:1000; } .banner { margin-top: 50px; width: 100%; height: 400px; background: url('banner2.png') center/cover; border-bottom: 2px solid #333; }
    /* ✅ Logo Zone with Automatic Download Link */
    .logo-zone { padding: 40px; background: #000; }
    .logo-wrap { display: block; width: 240px; margin: 0 auto; text-decoration: none; position: relative; }
    .logo-main { width: 100%; filter: drop-shadow(0 0 10px #fff); animation: shine 3s infinite; }
    @keyframes shine { 50% { filter: brightness(1.4) drop-shadow(0 0 40px var(--primary)); } }
    
    .action-label { font-size: 24px; font-weight: 900; margin-top: 20px; color: #fff; }

    .stage { max-width: 1050px; margin: 20px auto; padding: 25px; background: #1c1c1e; border-radius: 45px; box-shadow: 0 40px 100px rgba(0,0,0,0.9); }
    .player { width: 100%; height: 550px; border-radius: 25px; overflow: hidden; background: #000; margin-bottom: 30px; border: 1px solid #333; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
    .card { background: #2c2c2e; padding: 18px; border-radius: 25px; cursor: pointer; border: 1px solid transparent; }
    .card:hover { border-color: var(--primary); transform: scale(1.05); }
    .card img { width: 100%; height: 75px; object-fit: contain; border-radius: 12px; }
    .ch-name { font-size: 10px; font-weight: 800; color: #aaa; margin-top: 10px; text-transform: uppercase; }

</style>
</head> <body>
<nav class="navbar">AMEER AZEEM GLOBAL MEDIA</nav> <div class="banner"></div>
<section class="logo-zone"> <!-- ✅ This specific link is the magic! It will download your APK when logo is clicked --> <a href="https://github.com/Ameer-Azeem-live-channels/ameer-azeem-live-/releases/download/v1.0/app-release.apk" class="logo-wrap"> <img src="logo.png.png" class="logo-main" onerror="this.src='https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/logo.png.png'"> <div class="action-label" id="act1">CLICK LOGO</div> <div class="sub-label" id="act2">DOWNLOAD APP & INSTALL</div> </a> </section>
<div class="lang-bar"> <button class="l-btn active" id="btn_ta" onclick="changeUI('ta')">Tamil</button> <button class="l-btn" id="btn_en" onclick="changeUI('en')">English</button> <button class="l-btn" id="btn_hi" onclick="changeUI('hi')">Hindi</button> <button class="l-btn" id="btn_ml" onclick="changeUI('ml')">Malayalam</button> <button class="l-btn" id="btn_ar" onclick="changeUI('ar')">Arabic</button> </div>
<div class="stage"> <div class="player"> <iframe id="vid" src="https://www.youtube.com/embed/live_stream?channel=UCYlh4lH762HvHt6mmiecyWQ&autoplay=1" width="100%" height="100%" frameborder="0" allowfullscreen></iframe> </div> <div class="grid" id="channelGrid"></div> </div>
<footer class="footer"> <p>© 2024 Ameer Azeem Global Media. 100% Revenue goes to original owners.</p> </footer>
<script> const GIST = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json";
const masterData = {
    ta: { act1: "லோகோவை அழுத்தவும்", act2: "ஆப் டவுன்லோட் & இன்ஸ்டால்" },
    en: { act1: "CLICK LOGO", act2: "DOWNLOAD APP & INSTALL" },
    hi: { act1: "लोगो पर क्लिक करें", act2: "ऐप इंस्टॉल करें" },
    ml: { act1: "ലോഗോ ക്ലിക്ക് ചെയ്യുക", act2: "ആപ്പ് ഇൻസ്റ്റാൾ ചെയ്യുക" },
    ar: { act1: "اضغط على الشعار", act2: "تحميل وتثبيت" }
};

const channelData = {
    ta: [{n:"SUN NEWS", i:"sun-news.png.png", id:"UCYlh4lH762HvHt6mmiecyWQ"}, {n:"POLIMER", i:"polimer-news.png.png", id:"UC8Z-VjXBtDJTvq6aqkIskPg"}, {n:"THANTHI TV", i:"news-thanthi.png.png", id:"UC-JFyL0zDFOsPMpuWu39rPA"}],
    en: [{n:"AL JAZEERA", i:"al-Jazeera-english.png.png", id:"UCNye-wNBqNL5ZzHSJj3l8Bg"}, {n:"SKY NEWS", i:"Sky-news-english.png.png", id:"UC7E-C2vH6SIn2vXU_p5_fFw"}]
};

let curL = 'ta'; let gCache = {};

async function init() { try { const r = await fetch(GIST + "?t=" + Date.now()); gCache = await r.json(); } catch(e) {} renderGrid(); }

function renderGrid() {
    const grid = document.getElementById('channelGrid');
    const data = channelData[curL] || channelData['ta'];
    grid.innerHTML = "";
    data.forEach(c => {
        const vid = gCache[c.i] || c.id;
        grid.innerHTML += `<div class="card" onclick="play('${vid}')">
            <img src="${c.i}" onerror="this.src='logo.png.png'">
            <div class="ch-name">${c.n}</div>
        </div>`;
    });
}

function play(id) {
    document.getElementById('vid').src = `https://www.youtube.com/embed/${id.length === 11 ? id : 'live_stream?channel='+id}?autoplay=1`;
    window.scrollTo({top: 450, behavior: 'smooth'});
}

function changeUI(l) {
    curL = l; const d = masterData[l] || masterData['en'];
    document.getElementById('act1').innerText = d.act1;
    document.getElementById('act2').innerText = d.act2;
    document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn_' + l).classList.add('active');
    renderGrid();
}

window.onload = init;
</script> </body> </html>
