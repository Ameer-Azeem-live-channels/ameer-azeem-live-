<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ameer Azeem Live - Official Download</title>
    <style>
        body { background: #010409; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 0; }
        .hero { padding: 80px 20px; background: linear-gradient(180deg, #161b22 0%, #010409 100%); }
        .logo { width: 150px; border-radius: 50%; box-shadow: 0 0 30px rgba(34, 197, 94, 0.3); }
        h1 { color: #22c55e; letter-spacing: 2px; margin-top: 20px; }
        .btn { display: inline-block; padding: 18px 40px; background: #22c55e; color: black; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 20px; margin-top: 30px; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #22c55e; }
        .social { margin-top: 50px; }
        .social a { color: #8b5cf6; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .status { margin-top: 15px; font-size: 12px; color: #6e7681; }
    </style>
</head>
<body>

    <div class="hero">
        <img src="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/logo.png" class="logo">
        <h1>AMEER AZEEM LIVE</h1>
        <p>Watch 7 Languages Live News & Entertainment</p>
        
        <a href="#" id="downloadBtn" onclick="startDownload()" class="btn">🚀 DOWNLOAD OFFICIAL APP</a>
        <p class="status" id="status">Fetching latest version...</p>

        <div class="social">
            <a href="https://t.me/AjiranGroup">TELEGRAM HUB</a>
            <a href="mailto:ameerazeemlive@gmail.com">SUPPORT</a>
        </div>
    </div>

    <script>
        // கிட்ஹப்பில் இருந்து தானாகவே ஏபிகே லிங்க்கை எடுக்கும் கோடிங்
        const gistUrl = "https://api.github.com/gists/41a0c696f5fb2cb0385390afab22dc7b";
        let finalApkUrl = "";

        async function fetchLatestApk() {
            try {
                const response = await fetch(gistUrl);
                const data = await response.json();
                const content = JSON.parse(data.files["channels.json"].content);
                finalApkUrl = content.latest_apk;
                document.getElementById('status').innerText = "System Ready: v1.0.0 Stable";
            } catch (e) {
                console.error("Error fetching APK URL");
                // Fallback Link
                finalApkUrl = "https://github.com/Ameer-Azeem-live-channels/ameer-azeem-live-/raw/main/Ameer_Azeem_Live.apk";
            }
        }

        function startDownload() {
            if (finalApkUrl) {
                window.location.href = finalApkUrl;
            } else {
                alert("Loading... Please try in 2 seconds.");
            }
        }

        fetchLatestApk();
    </script>
</body>
</html>
