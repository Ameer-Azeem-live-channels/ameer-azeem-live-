async function updateWebTraffic() {
    const today = new Date().toISOString().split('T')[0];
    if (!allData.stats) allData.stats = {};
    if (!allData.stats[today]) allData.stats[today] = { "app_opens": 0, "web_views": 0, "total_views": 0, "countries": {} };
    allData.stats[today].web_views += 1;
    await fetch(GIST_URL, { method: "PATCH", headers: { "Authorization": "Bearer " + SECURE_TOKEN }, body: JSON.stringify({ files: { "channels.json": { content: JSON.stringify(allData) } } }) });
}

function loadNav() {

        div.className = 'lang-btn' + (cat === "TAMIL" ? " active-lang" : "");
        div.id = `btn-${cat}`;
        div.onclick = () => changeLanguage(cat);
        div.innerHTML = `<div class="lang-circle">${cat.charAt(0)}</div><div class="lang-name">${cat}</div>`;
        nav.appendChild(div);
    });

function changeLanguage(lang) {

    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
    if(document.getElementById(`btn-${lang}`)) document.getElementById(`btn-${lang}`).classList.add('active-lang');

    // 3. சேனல் கிரிட் மற்றும் முதல் வீடியோ பிளே செய்தல்

    if (channels.length > 0) {
        // முதல் சேனலைத் தானாக பிளே செய்ய
        const firstVid = allData[channels[0]];

                }
            };
            card.innerHTML = `<img src="${(IMG_BASE+ch).replace(/ /g,"%20")}" onerror="this.src='logo.png.png'">`;

        });
    }
