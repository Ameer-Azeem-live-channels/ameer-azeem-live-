<!DOCTYPE html> <html lang="ta"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- பேஸ்புக் மற்றும் வாட்ஸ்அப் முன்னோட்டம் - லோகோ லிங்க் சரி செய்யப்பட்டது -->
<title>Ameer Azeem Global Media - Live TV</title>
<meta property="og:title" content="Ameer Azeem Global Media">
<meta property="og:description" content="Watch 65+ Live TV Channels. Download App Now!">
<meta property="og:image" content="https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/logo.png.png">
<meta property="og:url" content="https://ameer-azeem-live-channels.github.io/ameer-azeem-live-/">
<meta property="og:type" content="website">

<style>
    :root { --primary-red: #b71c1c; --bg-black: #030712; --card-bg: #0f172a; --accent-blue: #3b82f6; }
    body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
    
    /* லோகோ பகுதி - லேப்டாப் மற்றும் மொபைலில் தெரியும் வகையில் */
    header { text-align: center; padding: 30px 20px; background: #000; border-bottom: 2px solid var(--primary-red); }
    .logo { height: 120px; cursor: pointer; transition: 0.4s; filter: drop-shadow(0 0 15px rgba(183,28,28,0.5)); }
    .logo:hover { transform: scale(1.1); }

    .ticker-wrap { background: #111827; height: 45px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .ticker-label { background: var(--primary-red); padding: 0 15px; font-weight: bold; height: 100%; display: flex; align-items: center; font-size: 13px; z-index: 5; }
    .ticker { white-space: nowrap; animation: marquee 30s linear infinite; padding-left: 20px; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    /* மொழி தேர்வுகள் - GLOW EFFECT */
    .nav-scroll { display: flex; overflow-x: auto; gap: 20px; padding: 25px; justify-content: center; background: #0a0f1e; }
    .lang-btn { text-align: center; cursor: pointer; opacity: 0.6; transition: 0.3s; }
    .lang-circle { 
        width: 80px; height: 80px; border-radius: 50%; 
        border: 2px solid #334155; padding: 3px; background: #1e293b; 
        object-fit: cover; display: flex; align-items: center; justify-content: center; font-weight: bold;
    }
    .active-lang { opacity: 1; transform: scale(1.1); }
    .active-lang .lang-circle { border-color: var(--accent-blue); box-shadow: 0 0 20px var(--accent-blue); }
    .lang-name { font-size: 12px; margin-top: 10px; font-weight: bold; color: #94a3b8; }

    /* பிளேயர் */
    #player-container { width: 90%; max-width: 950px; margin: 25px auto; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    iframe { width: 100%; height: 100%; border: none; }

    /* சேனல் லிஸ்ட் */
    .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding: 25px; max-width: 1100px; margin: 0 auto; }
    .channel-card { 
        background: var(--card-bg); border-radius: 15px; padding: 12px; 
        text-align: center; cursor: pointer; transition: 0.3s; 
        border: 1px solid rgba(255,255,255,0.05); 
    }
    .channel-card:hover { transform: scale(1.1); border-color: var(--accent-blue); }
    .channel-card img { width: 75px; height: 75px; object-fit: contain; }

    /* ஃபீட்பேக் */
    .feedback-section { max-width: 500px; margin: 40px auto; padding: 25px; background: #0f172a; border-radius: 20px; text-align: center; border: 1px solid #334155; }
    .feedback-input { width: 90%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #030712; color: white; margin-bottom: 15px; resize: none; }
    .submit-btn { padding: 10px 40px; background: var(--accent-blue); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }

    footer { text-align: center; padding: 50px 20px; color: #64748b; font-size: 13px; }
    .est { color: var(--primary-red); font-weight: bold; margin-bottom: 10px; }

    @media (max-width: 600px) {
        .logo { height: 80px; }
        .nav-scroll { justify-content: flex-start; }
        .channel-grid { grid-template-columns: repeat(3, 1fr); }
    }
</style>
</head> <body>
<header> <!-- APK ரிலீஸ் டவுன்லோட் லிங்க் - இது லேட்டஸ்ட் APK-வை தேடி எடுக்கும் --> <a id="apk-link" href="#"> <img src="[logo.png.png](file:///C:/Users/Kiran%20A/StudioProjects/ameer_azeem_live_channels/assets/images/ameer%20azeem%20logo/logo.png.png)" class="logo" alt="Ameer Azeem"> </a> <p style="color: #94a3b8; font-size: 12px; margin-top: 15px; font-weight: bold;">CLICK LOGO TO DOWNLOAD APP</p> </header>
<div class="ticker-wrap"> <div class="ticker-label" id="lbl-live">LIVE NEWS</div> <div class="ticker" id="ticker-text">Welcome to Ameer Azeem Global Media Network!</div> </div>
<div class="nav-scroll" id="lang-nav"></div>
<div id="player-container"> <iframe id="main-player" src="https://www.youtube.com/embed/9M02G5c6x6w" allowfullscreen></iframe> </div>
<div class="channel-grid" id="channel-list"></div>
<div class="feedback-section"> <h3 id="f-title">SEND FEEDBACK</h3> <textarea id="f-msg" class="feedback-input" rows="3" placeholder="Message..."></textarea><br> <button class="submit-btn" onclick="sendF()" id="f-btn">SUBMIT</button> </div>
<footer> <div id="est-date" class="est">Established: September 2025</div> <p>AMEER AZEEM GLOBAL MEDIA © 2026</p> </footer>
<script> // கிட்ஹப் API மூலம் லேட்டஸ்ட் APK லிங்கை எடுக்கிறது const REPO = "Ameer-Azeem-live-channels/ameer-azeem-live-"; const GIST_URL = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json";
let allData = {};
const categories = ["TAMIL", "ENGLISH", "HINDI", "MALAYALAM", "TELUGU", "KANNADA", "ARABIC"];

const translations = {
    "TAMIL": { live: "நேரலை", welcome: "அமீர் அஜீம் மீடியா நெட்வொர்க்கிற்கு உங்களை வரவேற்கிறோம்!", ftitle: "கருத்துக்கள்", fbtn: "அனுப்புக", est: "தொடக்கம்: செப்டம்பர் 2025" },
    "ENGLISH": { live: "LIVE", welcome: "Welcome to Ameer Azeem Global Media!", ftitle: "FEEDBACK", fbtn: "SUBMIT", est: "Established: September 2025" }
};

const channelMapping = {
    "TAMIL": ["sun-news.png.png", "news-seven.png.png", "tamil-news.png.png", "news-thanthi.png.png", "polimer-news.png.png", "sathiya-news.png.png", "jayapluse-news.png.png", "kalaigar- news.png.png", "malaimurasu-news.png.png", "tamilnadu-news18.png.png", "puthiya-thalaimurai-news.png.png"],
    "ENGLISH": ["repulics-english.png.png", "Time-now-english.png.png", "ndtc-english.png.png", "india-today-english.png.png", "cnn-english.png.png", "wion-english.png.png", "Sky-news-english.png.png", "dw-news-english.png.png", "al-Jazeera-english.png.png", "al-arabiya-english.png.png", "first-post-english.png.png", "united-nations-english.png.png", "earch-cam.png.png", "cruxnews.png"],
    "HINDI": ["aaj-tak-hindi-news.png.png", "abp-hindi-news.png.png", "z-news-hindi.png.png", "india-today-news.png.png", "cnn-hindi-news18.png.png", "republic-bharath-news.png.png", "time-nowhindi-news.png.png", "tv9-hindi-news.png.png", "24-think-hindi -news.png.png", "dd-news-hindi.png.png", "dna-hindi-news.png.png"],
    "MALAYALAM": ["asianet-news.png.png", "twenty-four-news.png.png", "media-one-news.png", "reporter-news.png.png", "kairali-news.png", "news18 -malayalam.png", "big-tv-news.png"],
    "TELUGU": ["tv9-telugu-news.png.png", "ntv-telugu-news.png.png", "z-news-telugu.png.png", "abc-telugu-news.png.png", "tv5-news-telugu.png.png", "10tv-telugu-news.png.png", "hmtv-telugu-news.png.png", "bigtv-news-telugu.png.png"],
    "KANNADA": ["tv9-kanada-news.png.png", "news18-kanada.png.png", "news1st-kanada.png.png", "asianet-nwes-kanada.png.png"],
    "ARABIC": ["sky-news.png.png", "al-arabiya-news.png.png", "aljazeera-news.png.png", "france24-news.png.png", "al-quran-makkah.png.png", "arbic-alghad-news.png.png", "arabic-alaraby-news.png.png", "money-controal-arabic-news.png.png", "aljazeera- mubasher-news.png.png"]
};

async function init() {
    try {
        // லேட்டஸ்ட் APK ஸ்கேன்
        const resApk = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
        const apkData = await resApk.json();
        const apkAsset = apkData.assets.find(a => a.name.endsWith('.apk'));
        if(apkAsset) document.getElementById('apk-link').href = apkAsset.browser_download_url;

        const res = await fetch(GIST_URL + "?t=" + Date.now());
        allData = await res.json();
        loadNav();
        changeLanguage("TAMIL");
    } catch (e) { console.error("Error loading"); }
}

function loadNav() {
    const nav = document.getElementById('lang-nav');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'lang-btn' + (cat === "TAMIL" ? " active-lang" : "");
        div.id = `btn-${cat}`;
        div.onclick = () => changeLanguage(cat);
        // மொழிகளுக்கான ஐகான் இல்லாததால் அழகான எழுத்து ஐகானாக மாற்றியுள்ளேன்
        div.innerHTML = `<div class="lang-circle">${cat.charAt(0)}</div><div class="lang-name">${cat}</div>`;
        nav.appendChild(div);
    });
}

function changeLanguage(lang) {
    const t = translations[lang] || translations["ENGLISH"];
    document.getElementById('lbl-live').innerText = t.live;
    document.getElementById('ticker-text').innerText = allData.admin_message || t.welcome;
    document.getElementById('f-title').innerText = t.ftitle;
    document.getElementById('f-btn').innerText = t.fbtn;
    document.getElementById('est-date').innerText = t.est;

    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active-lang'));
    document.getElementById(`btn-${lang}`).classList.add('active-lang');

    const grid = document.getElementById('channel-list');
    grid.innerHTML = "";
    channelMapping[lang].forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.onclick = () => {
            const vid = allData[ch];
            if(vid) document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            window.scrollTo({top: 180, behavior: 'smooth'});
        };
        // உங்கள் கிட்ஹப்பில் உள்ள நேரடி இமேஜ் லிங்க்
        card.innerHTML = `<img src="${encodeURIComponent(ch)}" onerror="this.src='logo.png.png'">`;
        grid.appendChild(card);
    });
}

function sendF() {
    const msg = document.getElementById('f-msg').value;
    if(!msg) return;
    window.open(`https://t.me/AjiranGroup?text=${encodeURIComponent("FEEDBACK: " + msg)}`, '_blank');
    alert("Success!");
    document.getElementById('f-msg').value = "";
}

init();
</script> </body> </html>
