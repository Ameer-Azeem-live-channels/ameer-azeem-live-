<style>
    :root { --primary-red: #b71c1c; --bg-black: #050505; --card-bg: #111827; --accent-blue: #3b82f6; }
    body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; overflow-x: hidden; }
    
    /* Header */
    header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: #000; border-bottom: 2px solid var(--primary-red); position: sticky; top: 0; z-index: 1000; }
    .logo { height: 60px; cursor: pointer; transition: 0.3s; }
    .search-box { background: #1e293b; border: 1px solid #334155; padding: 8px 15px; border-radius: 20px; color: white; width: 250px; outline: none; }

    /* News Ticker */
    .ticker-wrap { background: #111827; height: 40px; display: flex; align-items: center; overflow: hidden; border-bottom: 1px solid #1e293b; }
    .ticker { white-space: nowrap; animation: marquee 30s linear infinite; padding-left: 20px; font-weight: bold; color: #ef4444; }
    @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    /* Main Layout */
    .main-container { display: grid; grid-template-columns: 32% 68%; padding: 20px 40px; gap: 20px; }

    /* Left Side: Hero */
    .hero-section { 
        background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,1)), url('https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/logo.png.png');
        background-size: cover; background-position: center; border-radius: 20px; padding: 30px; height: 500px;
        display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid #1e293b;
    }
    .hero-title { font-size: 32px; font-weight: 900; margin: 0; color: white; }
    .hero-desc { font-size: 14px; color: #94a3b8; margin: 10px 0 20px; line-height: 1.6; }
    .dl-btn { background: var(--primary-red); color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; width: fit-content; }

    /* Right Side: Player & Grid */
    #player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
    iframe { width: 100%; height: 100%; border: none; }

    .lang-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
    .lang-item { min-width: 80px; padding: 10px; background: var(--card-bg); border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid transparent; }
    .active-lang { border-color: var(--accent-blue); background: rgba(59, 130, 246, 0.1); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; padding-top: 20px; }
    .card { background: var(--card-bg); border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #1e293b; }
    .card:hover { transform: scale(1.1); border-color: white; }
    .card img { width: 60px; height: 60px; object-fit: contain; }

    /* Feedback Section */
    .f-section { background: #0f172a; padding: 25px; border-radius: 20px; margin-top: 30px; text-align: center; border: 1px solid #1e293b; }
    .f-input { width: 90%; padding: 12px; background: #030712; border: 1px solid #334155; color: white; border-radius: 10px; margin-bottom: 15px; }
    .f-btn { background: var(--accent-blue); border: none; padding: 10px 40px; color: white; font-weight: bold; border-radius: 20px; cursor: pointer; }

    footer { text-align: center; padding: 40px; color: #475569; font-size: 12px; }

    @media (max-width: 1000px) { .main-container { grid-template-columns: 1fr; } .hero-section { height: 250px; } }
</style>

<script> const REPO = "Ameer-Azeem-live-channels/ameer-azeem-live-"; const GIST = "https://gist.githubusercontent.com/Ameer-Azeem-live-channels/41a0c696f5fb2cb0385390afab22dc7b/raw/channels.json"; const IMG_BASE = "https://raw.githubusercontent.com/Ameer-Azeem-live-channels/ameer-azeem-live-/main/";
let allData = {}, currentLang = "TAMIL";
const categories = ["TAMIL", "ENGLISH", "HINDI", "MALAYALAM", "TELUGU", "KANNADA", "ARABIC"];

const translations = {
    "TAMIL": { name: "அமீர் அஜீம்", desc: "7 மொழிகளில் 65+ நேரலை சேனல்கள். உலகத்தரம் வாய்ந்த செய்திகளை உடனுக்குடன் காணுங்கள்.", dl: "ஆப்பை பதிவிறக்குக", grid: "தமிழ் சேனல்கள்", fhead: "கருத்துக்கள்", fsend: "அனுப்புக", fhold: "இங்கே எழுதவும்...", ticker: "அமீர் அஜீம் மீடியா நெட்வொர்க்கிற்கு உங்களை வரவேற்கிறோம்!" },
    "ENGLISH": { name: "AMEER AZEEM", desc: "Experience 65+ Premium Channels in 7 Global Languages. High-quality news anytime.", dl: "DOWNLOAD APP", grid: "ENGLISH CHANNELS", fhead: "FEEDBACK", fsend: "SUBMIT", fhold: "Type here...", ticker: "Welcome to Ameer Azeem Global Media!" }
};

const mapping = {
    "TAMIL": ["sun-news.png.png", "news-seven.png.png", "tamil-news.png.png", "news-thanthi.png.png", "polimer-news.png.png", "sathiya-news.png.png", "jayapluse-news.png.png", "kalaigar- news.png.png", "malaimurasu-news.png.png", "tamilnadu-news18.png.png", "puthiya-thalaimurai-news.png.png"],
    "ENGLISH": ["repulics-english.png.png", "Time-now-english.png.png", "ndtc-english.png.png", "india-today-english.png.png", "cnn-english.png.png", "wion-english.png.png", "Sky-news-english.png.png", "dw-news-english.png.png", "al-Jazeera-english.png.png", "al-arabiya-english.png.png", "first-post-english.png.png", "united-nations-english.png.png", "earch-cam.png.png", "cruxnews.png"],
    "HINDI": ["aaj-tak-hindi-news.png.png", "abp-hindi-news.png.png", "z-news-hindi.png.png", "republic-bharath-news.png.png", "time-nowhindi-news.png.png", "tv9-hindi-news.png.png", "24-think-hindi -news.png.png", "dd-news-hindi.png.png", "dna-hindi-news.png.png"],
    "MALAYALAM": ["asianet-news.png.png", "twenty-four-news.png.png", "media-one-news.png", "reporter-news.png.png", "kairali-news.png", "news18 -malayalam.png", "big-tv-news.png"],
    "TELUGU": ["tv9-telugu-news.png.png", "ntv-telugu-news.png.png", "z-news-telugu.png.png", "abc-telugu-news.png.png", "tv5-news-telugu.png.png", "10tv-telugu-news.png.png", "hmtv-telugu-news.png.png", "bigtv-news-telugu.png.png"],
    "KANNADA": ["tv9-kanada-news.png.png", "news18-kanada.png.png", "news1st-kanada.png.png", "asianet-nwes-kanada.png.png"],
    "ARABIC": ["sky-news.png.png", "al-arabiya-news.png.png", "aljazeera-news.png.png", "france24-news.png.png", "al-quran-makkah.png.png", "arbic-alghad-news.png.png", "arabic-alaraby-news.png.png", "money-controal-arabic-news.png.png", "aljazeera- mubasher-news.png.png"]
};

async function init() {
    try {
        const resApk = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
        const apkData = await resApk.json();
        const apkAsset = apkData.assets.find(a => a.name.endsWith('.apk'));
        if(apkAsset) {
            document.getElementById('apk-dl').href = apkAsset.browser_download_url;
            document.getElementById('hero-dl-btn').href = apkAsset.browser_download_url;
        }
        const resGist = await fetch(GIST + "?t=" + Date.now());
        allData = await resGist.json();
        loadNav();
        updatePage("TAMIL");
    } catch(e) { console.error("Load failed"); }
}

function loadNav() {
    const nav = document.getElementById('lang-nav');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'lang-item';
        div.id = `btn-${cat}`;
        div.onclick = () => updatePage(cat);
        div.innerHTML = `<div style="font-weight:bold;">${cat}</div>`;
        nav.appendChild(div);
    });
}

function updatePage(lang) {
    currentLang = lang;
    const t = translations[lang] || translations["ENGLISH"];
    document.getElementById('hero-name').innerText = t.name;
    document.getElementById('hero-desc').innerText = t.desc;
    document.getElementById('hero-dl-btn').innerText = t.dl;
    document.getElementById('grid-title').innerText = t.grid;
    document.getElementById('f-head').innerText = t.fhead;
    document.getElementById('f-send').innerText = t.fsend;
    document.getElementById('f-msg').placeholder = t.fhold;
    document.getElementById('ticker-text').innerText = allData.admin_message || t.ticker;

    document.querySelectorAll('.lang-item').forEach(b => b.classList.remove('active-lang'));
    document.getElementById(`btn-${lang}`).classList.add('active-lang');
    renderGrid();
}

function renderGrid(filter = "") {
    const grid = document.getElementById('channel-list');
    grid.innerHTML = "";
    mapping[currentLang].forEach(ch => {
        if (ch.toLowerCase().includes(filter.toLowerCase())) {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                const vid = allData[ch];
                if(vid) document.getElementById('main-player').src = `https://www.youtube.com/embed/${vid}?autoplay=1`;
            };
            const chImg = (IMG_BASE + ch).replace(/ /g, "%20");
            card.innerHTML = `<img src="${chImg}" onerror="this.src='logo.png.png'">`;
            grid.appendChild(card);
        }
    });
}

function searchChannels() {
    const query = document.getElementById('search').value;
    renderGrid(query);
}

function sendF() {
    const msg = document.getElementById('f-msg').value;
    if(!msg) return;
    window.open(`https://t.me/AjiranGroup?text=${encodeURIComponent("WEB FEEDBACK: " + msg)}`, '_blank');
    alert("Success! Sent.");
    document.getElementById('f-msg').value = "";
}

init();
</script> </body> </html>
