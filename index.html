let sIdx = 0; setInterval(() => { sIdx = (sIdx + 1) % 4; document.getElementById('mainSlider').style.transform = `translateX(-${sIdx * 100}%)`; }, 5000);

async function init() {
    try { const r = await fetch(GIST + "?t=" + Date.now()); gCache = await r.json(); } catch(e) {}

function renderGrid() {
    const grid = document.getElementById('channelGrid');

}
